services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      zilobase:
        condition: service_healthy
    environment:
      ZILOBASE_SITE_ADDRESS: ${ZILOBASE_SITE_ADDRESS:-http://localhost}
    ports:
      - "${ZILOBASE_HTTP_PORT:-80}:80"
      - "${ZILOBASE_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  zilobase:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-zilobase}:${POSTGRES_PASSWORD:-zilobase}@postgres:5432/${POSTGRES_DB:-zilobase}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-only-change-me-zilobase-auth-secret-32}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      IMAGE_STORAGE_MODE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET_NAME: ${MINIO_BUCKET:-zilobase}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-zilobase}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-zilobase-minio-password}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TOOLKIT_API_KEY: ${TOOLKIT_API_KEY:-}
      TOOLKIT_BASE_URL: ${TOOLKIT_BASE_URL:-}
      EMAIL_FROM: ${EMAIL_FROM:-Zilobase <hello@example.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zilobase}
      POSTGRES_USER: ${POSTGRES_USER:-zilobase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zilobase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zilobase}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zilobase-minio-password}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zilobase}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zilobase-minio-password}
      MINIO_BUCKET: ${MINIO_BUCKET:-zilobase}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set zilobase http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "zilobase/$$MINIO_BUCKET"
        mc anonymous set none "zilobase/$$MINIO_BUCKET"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  minio_data:
