name: Feature request
description: Suggest an improvement or new capability.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Notelab do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, mockups, links, or related issues if useful.
